<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>避難所案内マップ - Material You</title>

    <!-- ================= PWA設定 ================= -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#006a60">
    <meta name="description" content="現在地周辺の避難所・避難場所を検索できる地図アプリ">

    <!-- ファビコン -->
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png">

    <!-- iOS向けホーム画面設定 -->
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="避難所マップ">

    <!-- Android向け設定 -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- 軽量化: 外部CDNへ事前接続しておき、DNS/TLSハンドシェイクの待ち時間を短縮 -->
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">

    <!-- Leaflet.js CDN -->
    <!-- 軽量化: defer を付け、HTMLパース・初期描画をブロックしないようにする（地図初期化はwindow.onloadで行うため実害なし） -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com" defer></script>

    <!-- Google Fonts: Noto Sans JP & Inter -->
    <!-- 軽量化: 実際にコード内で使用しているウェイトのみに絞り込み（300/600は未使用のため削除） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- Material You (Material 3) Style Tokens -->
    <style>
        :root {
            /* M3 Tonal Palette (Sage Green & Mint Concept) */
            --md-primary: #006a60;
            --md-on-primary: #ffffff;
            --md-primary-container: #9cf1e4;
            --md-on-primary-container: #00201c;
            --md-secondary-container: #dae5e1;
            --md-on-secondary-container: #191c1b;
            --md-surface: #f4faf8;
            --md-surface-dim: #e5ebe9;
            --md-surface-container: #e9f0ee;
            --md-surface-container-high: #dee5e2;
            --md-on-surface: #171d1b;
            --md-on-surface-variant: #3f4946;
            --md-outline: #6f7976;
            --md-outline-variant: #bec9c5;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--md-surface);
            color: var(--md-on-surface);
        }

        /* Leaflet Container Tweaks */
        .leaflet-container {
            font-family: inherit;
            background-color: var(--md-surface-dim);
        }

        /* Material Ripple effect */
        .m3-interactive {
            position: relative;
            overflow: hidden;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .m3-interactive::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: currentColor;
            opacity: 0;
            transition: opacity 0.15s linear;
            pointer-events: none;
        }
        .m3-interactive:hover::after {
            opacity: 0.08;
        }
        .m3-interactive:active::after {
            opacity: 0.16;
        }

        /* Custom Scrollbar for M3 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--md-outline); }

        /* Bottom Sheet Transition (Mobile) */
        @media (max-width: 768px) {
            .mobile-bottom-sheet {
                transition: transform 0.35s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            }
        }

        /* ================= タッチ操作性の改善 ================= */
        /* タップ後の300ms遅延・意図しないダブルタップズームを抑止し、反応をキビキビさせる */
        button, .filter-chip, .leaflet-marker-icon, #shelter-list li {
            touch-action: manipulation;
        }

        /* 選択中の避難所ピン：タップした瞬間にわかりやすくポップさせる */
        .shelter-pin-selected {
            animation: pin-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 3px 6px rgba(179, 38, 30, 0.35));
        }
        @keyframes pin-pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.22); }
            100% { transform: scale(1); }
        }

        /* 避難所ピンをタップした際の情報ポップアップ（Material Youのカードに合わせる） */
        .leaflet-popup-content-wrapper {
            background: var(--md-surface);
            color: var(--md-on-surface);
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.18);
        }
        .leaflet-popup-content {
            margin: 14px 16px;
            line-height: 1.4;
            min-width: 180px;
        }
        .leaflet-popup-tip {
            background: var(--md-surface);
        }
        .leaflet-popup-close-button {
            color: var(--md-on-surface-variant) !important;
            font-size: 20px !important;
            padding: 6px 8px 0 0 !important;
        }
    </style>
</head>
<body class="overflow-hidden h-screen w-full select-none">

    <div id="app" class="relative w-full h-full flex flex-col md:flex-row overflow-hidden">
        
        <!-- ================= マップエリア (背面全画面) ================= -->
        <div id="map-pane" class="relative flex-1 h-full z-0">
            <!-- Leaflet地図 -->
            <div id="map" class="w-full h-full"></div>

            <!-- ================= 現在地設定別ウィンドウ (マップ左上配置) ================= -->
            <div id="location-window" class="absolute top-4 left-4 z-[1000] w-[calc(100%-32px)] sm:w-[320px] bg-white/90 backdrop-blur-md p-4 rounded-3xl shadow-xl border border-gray-200/50 flex flex-col gap-3 transition-all duration-300">
                <!-- ウィンドウヘッダー -->
                <div class="flex items-center justify-between border-b border-gray-100 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-teal-600 animate-pulse"></span>
                        <h2 class="text-sm font-bold text-gray-800">現在地設定</h2>
                    </div>
                    <!-- ステータス表示バッジ -->
                    <div id="current-location-display" class="text-[10px] font-bold px-2.5 py-0.5 rounded-full" style="background-color: var(--md-surface-container-high); color: var(--md-on-surface-variant);">
                        未設定
                    </div>
                </div>
                <!-- ボタン選択エリア -->
                <div class="grid grid-cols-2 gap-2">
                    <!-- GPSで取得 -->
                    <button id="btn-gps" style="background-color: var(--md-primary-container); color: var(--md-on-primary-container);" class="m3-interactive flex flex-col items-center justify-center py-2.5 px-2 rounded-2xl shadow-sm hover:shadow-md hover:scale-[1.02] active:scale-[0.98] font-bold text-xs gap-1">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M224,120H183.33A56.12,56.12,0,0,0,136,72.67V32a8,8,0,0,0-16,0V72.67A56.12,56.12,0,0,0,72.67,120H32a8,8,0,0,0,0,16H72.67A56.12,56.12,0,0,0,120,183.33V224a8,8,0,0,0,16,0V183.33A56.12,56.12,0,0,0,183.33,136H224a8,8,0,0,0,0-16Zm-96,40a32,32,0,1,1,32-32A32,32,0,0,1,128,160Z"></path></svg>
                        GPSで取得
                    </button>
                    <!-- 地図から選択 -->
                    <button id="btn-map-select" style="background-color: var(--md-surface); color: var(--md-primary); border: 1px solid var(--md-outline-variant);" class="m3-interactive flex flex-col items-center justify-center py-2.5 px-2 rounded-2xl shadow-sm hover:shadow-md hover:scale-[1.02] active:scale-[0.98] font-bold text-xs gap-1">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M228.92,49.69a8,8,0,0,0-6.86-1.45L160.93,63.52,99.58,32.84a8,8,0,0,0-7.16,0L27.08,65.3A8,8,0,0,0,24,72.49v136a8,8,0,0,0,11.08,7.38l61.13-21.58,61.35,30.68a8.15,8.15,0,0,0,3.58.84,8,8,0,0,0,3.58-.84l65.34-32.66A8,8,0,0,0,232,185.51V56A8,8,0,0,0,228.92,49.69ZM96,52.53l56,28v123l-56-28ZM40,79.52l40-14.12v123L40,202.48Zm176,97-40,20v-123l40-14.12Z"></path></svg>
                        地図から選択
                    </button>
                </div>
                <!-- オフライン用マップ事前ダウンロード -->
                <button id="btn-download-map" style="background-color: var(--md-secondary-container); color: var(--md-on-secondary-container);" class="m3-interactive w-full flex items-center justify-center gap-2 py-2.5 px-3 rounded-2xl shadow-sm hover:shadow-md active:scale-[0.98] font-bold text-xs">
                    <svg id="btn-download-map-icon-default" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M224,152v56a16,16,0,0,1-16,16H48a16,16,0,0,1-16-16V152a8,8,0,0,1,16,0v56H208V152a8,8,0,0,1,16,0Z"></path><path d="M170.34,133.66l-40,40a8,8,0,0,1-11.32,0l-40-40a8,8,0,0,1,11.32-11.32L120,152.69V40a8,8,0,0,1,16,0V152.69l29.66-29.65a8,8,0,0,1,11.32,11.32Z"></path></svg>
                    <svg id="btn-download-map-icon-ready" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.18"/>
                        <path d="M7 12.3l3.2 3.2 6.6-6.6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span id="btn-download-map-label">オフライン用に地図を保存</span>
                </button>
            </div>

            <!-- 現在地決定モード時の中央ピン (シンプルなグレー十字ヘアライン) -->
            <div id="center-pin" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[1000] pointer-events-none">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line x1="20" y1="0" x2="20" y2="40" stroke="#6b7280" stroke-width="2.5" />
                    <line x1="0" y1="20" x2="40" y2="20" stroke="#6b7280" stroke-width="2.5" />
                </svg>
            </div>

            <!-- 現在地決定アクションバー (より直感的でわかりやすいUIに改善) -->
            <div id="set-location-container" class="hidden absolute bottom-24 md:bottom-10 left-1/2 transform -translate-x-1/2 z-[1000] flex flex-col items-center gap-3 w-[90%] max-w-sm">
                <!-- ガイドメッセージ -->
                <div class="bg-white/95 backdrop-blur px-5 py-2.5 rounded-full shadow-lg text-sm font-bold text-center text-gray-800 border border-gray-200">
                    マップを動かして現在地を合わせてください
                </div>
                <!-- ボタン群 -->
                <div class="flex gap-2 w-full">
                    <button id="btn-cancel-location" class="flex-1 m3-interactive font-bold py-3.5 px-4 rounded-full shadow-md bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 active:scale-[0.97] transition-transform text-sm">
                        キャンセル
                    </button>
                    <button id="btn-confirm-location" class="flex-[1.5] m3-interactive font-bold py-3.5 px-4 rounded-full shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-transform flex items-center justify-center gap-2 text-white text-sm" style="background-color: var(--md-primary);">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M128,16a88.1,88.1,0,0,0-88,88c0,75.3,80,132.17,83.41,134.55a8,8,0,0,0,9.18,0C136,236.17,216,179.3,216,104A88.1,88.1,0,0,0,128,16Zm0,56a32,32,0,1,1-32,32A32,32,0,0,1,128,72Z"></path></svg>
                        ここにする
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= 操作パネル (右側へ変更) ================= -->
        <!-- デスクトップ：右側浮遊Side Sheet、モバイル：スライド式ボトムシート -->
        <div id="control-pane" style="background-color: var(--md-surface);" class="mobile-bottom-sheet fixed md:absolute bottom-0 left-0 right-0 md:top-4 md:bottom-4 md:right-4 md:left-auto md:w-[380px] h-[70vh] md:h-auto z-[1001] rounded-t-[28px] md:rounded-[28px] shadow-2xl flex flex-col border border-[var(--md-outline-variant)]/30 md:border-none translate-y-[calc(70vh-56px)] md:translate-y-0">
            
            <!-- ボトムシート用ドラッグハンドル (モバイルのみ) -->
            <div id="drag-handle-container" class="md:hidden w-full h-14 flex items-center justify-center cursor-pointer shrink-0">
                <div class="w-10 h-1 rounded-full" style="background-color: var(--md-outline-variant);"></div>
            </div>

            <!-- ヘッダー -->
            <div class="px-5 pb-3 pt-2 md:pt-6 shrink-0">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-1.5">
                        <h1 class="text-xl font-bold tracking-tight" style="color: var(--md-on-surface);">避難所案内マップ</h1>
                        <button id="btn-info" aria-label="出典情報を表示" style="background-color: var(--md-secondary-container); color: var(--md-on-secondary-container);" class="m3-interactive w-5 h-5 rounded-full flex items-center justify-center text-[11px] font-black shrink-0 hover:scale-110 active:scale-95 transition-transform">
                            i
                        </button>
                    </div>
                </div>
            </div>

            <!-- 絞り込みフィルターセクション (M3 Filter Chips 横スクロール) -->
            <div class="px-5 py-2 shrink-0 border-b border-[var(--md-outline-variant)]/30">
                <!-- 災害種別チップス -->
                <div class="mb-3">
                    <span class="text-xs font-bold uppercase tracking-wider block mb-1.5" style="color: var(--md-on-surface-variant);">対応災害</span>
                    <div class="flex flex-wrap gap-2">
                        <button class="filter-chip m3-interactive flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border border-[var(--md-outline)]" data-group="disaster" data-value="earthquake" style="background-color: transparent; color: var(--md-on-surface);">
                            <span class="check-icon hidden">✓</span>地震
                        </button>
                        <button class="filter-chip m3-interactive flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border border-[var(--md-outline)]" data-group="disaster" data-value="landslide" style="background-color: transparent; color: var(--md-on-surface);">
                            <span class="check-icon hidden">✓</span>土砂災害
                        </button>
                        <button class="filter-chip m3-interactive flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border border-[var(--md-outline)]" data-group="disaster" data-value="flood" style="background-color: transparent; color: var(--md-on-surface);">
                            <span class="check-icon hidden">✓</span>河川氾濫
                        </button>
                    </div>
                </div>

                <!-- 施設区分チップス -->
                <div>
                    <span class="text-xs font-bold uppercase tracking-wider block mb-1.5" style="color: var(--md-on-surface-variant);">施設区分</span>
                    <div class="flex flex-wrap gap-2">
                        <button class="filter-chip m3-interactive flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border border-[var(--md-outline)]" data-group="type" data-value="指定避難所" style="background-color: transparent; color: var(--md-on-surface);">
                            <span class="check-icon hidden">✓</span>指定避難所
                        </button>
                        <button class="filter-chip m3-interactive flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border border-[var(--md-outline)]" data-group="type" data-value="指定緊急避難場所" style="background-color: transparent; color: var(--md-on-surface);">
                            <span class="check-icon hidden">✓</span>緊急避難所
                        </button>
                    </div>
                </div>
            </div>

            <!-- 避難所リストエリア (スクロール可能) -->
            <div class="flex-1 overflow-y-auto px-5 py-4">
                <div class="flex items-center justify-between mb-3 shrink-0">
                    <span id="shelter-count" class="text-xs font-bold" style="color: var(--md-on-surface-variant);">施設一覧</span>
                    <span id="filter-active-indicator" class="hidden text-xs font-bold px-2.5 py-0.5 rounded-full" style="background-color: var(--md-primary-container); color: var(--md-on-primary-container);">
                        フィルター適用中
                    </span>
                </div>
                <ul id="shelter-list" class="space-y-3">
                    <!-- JavaScriptで動的ロード -->
                </ul>
            </div>
        </div>
    </div>

    <!-- トースト通知 -->
    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 md:left-auto md:right-4 md:transform-none z-[2000] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm"></div>

    <!-- 出典情報モーダル -->
    <div id="info-modal" class="hidden fixed inset-0 z-[2100] flex items-center justify-center p-6">
        <div id="info-modal-backdrop" class="absolute inset-0 bg-black/40"></div>
        <div class="relative bg-white rounded-3xl shadow-2xl p-6 max-w-xs w-full flex flex-col gap-4">
            <div class="flex items-center gap-2.5">
                <span class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-black shrink-0" style="background-color: var(--md-primary-container); color: var(--md-on-primary-container);">i</span>
                <h2 class="font-bold text-base" style="color: var(--md-on-surface);">出典について</h2>
            </div>
            <p class="text-sm leading-relaxed" style="color: var(--md-on-surface-variant);">避難場所は総社市の公式サイトから引用</p>
            <button id="btn-info-close" class="m3-interactive w-full py-2.5 rounded-full font-bold text-sm text-white active:scale-[0.98] transition-transform" style="background-color: var(--md-primary);">閉じる</button>
        </div>
    </div>

    <!-- オフライン地図削除 確認モーダル -->
    <div id="delete-map-modal" class="hidden fixed inset-0 z-[2100] flex items-center justify-center p-6">
        <div id="delete-map-modal-backdrop" class="absolute inset-0 bg-black/40"></div>
        <div class="relative bg-white rounded-3xl shadow-2xl p-6 max-w-xs w-full flex flex-col gap-4">
            <div class="flex items-center gap-2.5">
                <span class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-black shrink-0" style="background-color: #fdecea; color: #b3261e;">!</span>
                <h2 class="font-bold text-base" style="color: var(--md-on-surface);">オフライン地図の削除</h2>
            </div>
            <p class="text-sm leading-relaxed" style="color: var(--md-on-surface-variant);">保存済みのオフライン地図データを削除しますか？削除後は再度オンラインでダウンロードするまで、オフライン環境で地図が表示できなくなります。</p>
            <div class="flex gap-2">
                <button id="btn-delete-map-cancel" class="m3-interactive flex-1 py-2.5 rounded-full font-bold text-sm active:scale-[0.98] transition-transform" style="background-color: var(--md-surface); color: var(--md-on-surface); border: 1px solid var(--md-outline-variant);">キャンセル</button>
                <button id="btn-delete-map-confirm" class="m3-interactive flex-1 py-2.5 rounded-full font-bold text-sm text-white active:scale-[0.98] transition-transform" style="background-color: #b3261e;">削除する</button>
            </div>
        </div>
    </div>

    <script>
        // グローバルエラーハンドラ：「Script error.」の中身をコンソールに残す
        window.addEventListener('error', function (e) {
            console.error('[避難所マップ] 実際のエラー内容:', e.message, e.filename, e.lineno, e.error);
        });
        window.addEventListener('unhandledrejection', function (e) {
            console.error('[避難所マップ] Promiseエラー:', e.reason);
        });

        // 「総社市_避難所一覧」の公式指定避難所データ 88件
        // ファクトチェック済み（2026-07-16）：総社市公式避難所一覧PDFおよびGoogleマップ上の
        // 各施設の公式住所と緯度経度を突合し、100m以上のズレがあった座標・
        // PDFと一致しなかった対応災害種別・住所の誤記を修正しています。
        // 修正箇所には shelter オブジェクトの直後に verified コメントを付与しています。
        const MOCK_SHELTERS = [

            { id: 80, name: "さんあいの家", lat: 34.645135, lng: 133.731597, type: ["指定避難所", "指定緊急避難場所"], desc: "岡山県総社市清音上中島266-1", disasters: ["earthquake", "flood", "landslide"] }, // verified: 住所の番地誤記（226-1→266-1）と、それに伴う約190mの座標ズレを修正

            { id: 83, name: "常盤公園", lat: 34.66698, lng: 133.739507, type: ["指定緊急避難場所"], desc: "岡山県総社市駅南1-24-1", disasters: ["earthquake", "flood", "landslide"] },
            { id: 84, name: "砂川公園駐車場", lat: 34.701096, lng: 133.76067, type: ["指定緊急避難場所"], desc: "岡山県総社市黒尾792", disasters: ["earthquake", "flood", "landslide"] },
            { id: 85, name: "西公園グラウンド", lat: 34.676381, lng: 133.705401, type: ["指定緊急避難場所"], desc: "岡山県総社市秦358", disasters: ["earthquake", "flood", "landslide"] }, // verified: 座標を約250m修正。対応災害もPDFに合わせ地震のみ→地震・水害・土砂災害に修正
            { id: 86, name: "西ふれあい広場", lat: 34.664425, lng: 133.681121, type: ["指定緊急避難場所"], desc: "岡山県総社市久代2616-3", disasters: ["earthquake", "flood", "landslide"] }, // verified: 対応災害をPDFに合わせ地震のみ→地震・水害・土砂災害に修正。座標はユーザー提供の実測値（34.664425, 133.681121）に更新（元の座標から約2.6kmのズレを修正）
            { id: 87, name: "山手スポーツ広場", lat: 34.654162, lng: 133.78163, type: ["指定緊急避難場所"], desc: "岡山県総社市宿1778-1", disasters: ["earthquake", "flood", "landslide"] }, // verified: 座標が約1.3kmずれていたため修正。対応災害もPDFに合わせ地震のみ→地震・水害・土砂災害に修正
            { id: 88, name: "清音ふるさとふれあい広場", lat: 34.654842, lng: 133.75421, type: ["指定緊急避難場所"], desc: "岡山県総社市清音三因1017-4", disasters: ["earthquake", "flood", "landslide"] } // verified: 座標が約790m（主に経度）ずれていたため修正。対応災害もPDFに合わせ地震のみ→地震・水害・土砂災害に修正
        ];

        // 対応災害の表示メタ情報（色・ラベル）
        // アイコンの色はM3の淡いコンテナ配色に合わせつつ、意味が直感的にわかるよう
        // 地震=赤系、土砂災害=琥珀系、河川氾濫=青系で区別している
        const DISASTER_META = {
            earthquake: { label: '地震',     dot: 'bg-red-500',   classes: 'bg-red-50 text-red-700 border border-red-100' },
            landslide:  { label: '土砂災害', dot: 'bg-amber-500', classes: 'bg-amber-50 text-amber-800 border border-amber-100' },
            flood:      { label: '河川氾濫', dot: 'bg-blue-500',  classes: 'bg-blue-50 text-blue-700 border border-blue-100' }
        };

        let map;
        let markers = [];
        let userMarker = null;
        let userLocation = null;
        
        // フィルター状態
        let filters = {
            type: [],
            disaster: []
        };

        // デフォルト中心（総社市役所付近）
        const defaultCenter = [34.675, 133.74];

        // ================= マップの表示可能範囲 =================
        // 全避難所（88件）の緯度経度の実際の分布は
        // 北緯34.645〜34.759 / 東経133.634〜133.792 に収まっているため、
        // それに数km分の余白を足した範囲だけをパン可能範囲・ダウンロード対象範囲とする。
        // （以前は総社市全体+周辺を広めに取った範囲だったため、実際に避難所がない
        // 　外周部分まで大量にタイルを持っていた）
        // マップの表示範囲を変える場合はここだけ書き換えればよい。
        const MAP_BOUNDS = { south: 34.61, west: 133.60, north: 34.80, east: 133.83 };

        // ================= オフライン地図保存 設定 =================
        // タイルの取得元URL（サブドメインを固定してキャッシュを一貫させる）
        const OSM_TILE_URL_TEMPLATE = 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';
        // Service Worker (service-worker.js) の TILE_CACHE と同じ名前にすること
        const TILE_CACHE_NAME = 'hinanjo-tiles-v1';
        // 事前ダウンロードするズーム範囲。広げるとタイル数が指数的に増える。
        // 市内という狭いエリアの地図であるため、広い範囲を見渡す「縮小」側の必要性は低く、
        // 個々の建物・避難所を正確に確認できる「拡大」側を優先する方針にしている。
        // 実機で試した結果、拡大側はz16程度で実用上十分と判断し、この範囲に調整した。
        // MAP_BOUNDSの範囲では目安として z15〜16で合計 約2,333枚
        // （内訳: z15=484 / z16=1,849）。旧設定(z13〜15、約650枚)の約3.6倍。
        const OFFLINE_MIN_ZOOM = 15;
        const OFFLINE_MAX_ZOOM = 16;
        // オンライン中はタイルをその場で都度取得できるため、事前ダウンロード範囲に縛られず
        // OSM標準タイルが提供する範囲でズーム自由度を持たせる（0=世界全体 / 19=OSM標準の最大精細度）。
        // オフライン中は「保存済みタイルの範囲＝実際に表示できる範囲」に一致させることで、
        // 保存していないズームレベルにアクセスして真っ白になる、という状態を防ぐ。
        const ONLINE_MIN_ZOOM = 0;
        const ONLINE_MAX_ZOOM = 19;

        // 現在の通信状態（オンライン/オフライン）に応じたズーム範囲を返す
        function getZoomRangeForConnection() {
            return navigator.onLine
                ? { min: ONLINE_MIN_ZOOM, max: ONLINE_MAX_ZOOM }
                : { min: OFFLINE_MIN_ZOOM, max: OFFLINE_MAX_ZOOM };
        }

        // 避難所を選択した際などにフォーカスするズームレベル。
        // オンライン時の上限(z19)まで寄せると近すぎるため、
        // オフライン保存範囲の上限(z16)を「詳細表示」の目安として固定で使う。
        const DETAIL_VIEW_ZOOM = OFFLINE_MAX_ZOOM;

        // map生成後に呼び出し、現在の通信状態に応じてズーム範囲を反映する。
        // navigator.onLineの変化(window の online/offline イベント)のたびに呼び直す想定。
        function applyZoomRangeForConnection() {
            if (!map) return;
            const { min, max } = getZoomRangeForConnection();
            map.setMinZoom(min); // 現在ズームが新しい範囲外なら自動でクランプされる
            map.setMaxZoom(max);
        }


        // DOM Elements
        const locationWindow = document.getElementById('location-window');
        const centerPin = document.getElementById('center-pin');
        const setLocationContainer = document.getElementById('set-location-container');
        
        const btnGps = document.getElementById('btn-gps');
        const btnMapSelect = document.getElementById('btn-map-select');
        const btnConfirmLocation = document.getElementById('btn-confirm-location');
        const btnCancelLocation = document.getElementById('btn-cancel-location');
        const currentLocationDisplay = document.getElementById('current-location-display');
        
        const shelterList = document.getElementById('shelter-list');
        const shelterCount = document.getElementById('shelter-count');
        const filterActiveIndicator = document.getElementById('filter-active-indicator');
        
        const filterChips = document.querySelectorAll('.filter-chip');
        const controlPane = document.getElementById('control-pane');
        const dragHandleContainer = document.getElementById('drag-handle-container');
        const toastContainer = document.getElementById('toast-container');

        const btnInfo = document.getElementById('btn-info');
        const infoModal = document.getElementById('info-modal');
        const infoModalBackdrop = document.getElementById('info-modal-backdrop');
        const btnInfoClose = document.getElementById('btn-info-close');

        const deleteMapModal = document.getElementById('delete-map-modal');
        const deleteMapModalBackdrop = document.getElementById('delete-map-modal-backdrop');
        const btnDeleteMapCancel = document.getElementById('btn-delete-map-cancel');
        const btnDeleteMapConfirm = document.getElementById('btn-delete-map-confirm');

        const btnDownloadMap = document.getElementById('btn-download-map');
        const btnDownloadMapLabel = document.getElementById('btn-download-map-label');
        const btnDownloadMapIconDefault = document.getElementById('btn-download-map-icon-default');
        const btnDownloadMapIconReady = document.getElementById('btn-download-map-icon-ready');

        function initMap() {
            // 読み込み・移動範囲を総社市周辺（避難所の分布範囲＋余白）に制限
            // 範囲はMAP_BOUNDS（オフライン保存と共通）を使用
            const sojaBounds = L.latLngBounds(
                [MAP_BOUNDS.south, MAP_BOUNDS.west], // 南西端
                [MAP_BOUNDS.north, MAP_BOUNDS.east]  // 北東端
            );

            // 起動時点の通信状態に応じたズーム範囲（オフラインなら保存済み範囲、オンラインなら自由）
            const initialZoomRange = getZoomRangeForConnection();

            map = L.map('map', {
                center: defaultCenter,
                zoom: 15,
                minZoom: initialZoomRange.min,
                maxZoom: initialZoomRange.max,
                maxBounds: sojaBounds, // 移動範囲を制限して不要な読み込みを防ぐ
                maxBoundsViscosity: 1.0, // 境界でピタッと止める
                zoomControl: false
            });

            // ズームコントロールの位置を左下に変更
            L.control.zoom({ position: 'bottomleft' }).addTo(map);

            // 注意: {s}によるサブドメイン分散(a/b/c)を使うと、同じタイルでも
            // 呼び出しごとに異なるURL（a.tile... / b.tile...）になり、
            // 事前にキャッシュしたタイルとURLが一致せずオフライン時にキャッシュが
            // ヒットしないことがあるため、ホストを固定してキャッシュの一貫性を保つ。
            // maxZoomはタイル自体が提供される上限（=オンライン時の上限）に合わせておく。
            // 実際にユーザーがズームできる範囲はmap側のminZoom/maxZoom
            // （通信状態に応じてapplyZoomRangeForConnectionが切り替える）で制御する。
            L.tileLayer(OSM_TILE_URL_TEMPLATE, {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: ONLINE_MAX_ZOOM
            }).addTo(map);

            // 通信状態が変化するたびにズーム範囲を切り替える
            window.addEventListener('online', () => {
                applyZoomRangeForConnection();
                showToast('オンラインになりました（ズーム制限を解除しました）');
            });
            window.addEventListener('offline', () => {
                applyZoomRangeForConnection();
                showToast('オフラインになりました（保存済み範囲にズームを制限します）');
            });

            renderMarkers();
            renderList();
        }

        // カスタムのSVGアイコン (Material 3スタイル)
        // 通常時はプライマリカラー、選択中の避難所は赤色にして「今どこを見ているか」を一目で分かるようにする
        const SHELTER_PIN_DEFAULT_COLOR = 'var(--md-primary)';
        const SHELTER_PIN_SELECTED_COLOR = '#b3261e'; // 削除確認モーダル等と同じ「強調・注意」の赤系に統一
        function buildShelterPinSvg(fillColor) {
            return `
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <!-- やわらかいドロップシャドウ -->
                <ellipse cx="20" cy="37" rx="10" ry="3" fill="rgba(0,0,0,0.15)" />
                
                <!-- マップピンの形状（白いフチ） -->
                <path d="M20,2 C10.6,2 3,9.6 3,19 C3,30 20,39 20,39 C20,39 37,30 37,19 C37,9.6 29.4,2 20,2 Z" fill="#ffffff" />
                
                <!-- マップピンの形状（メインカラー） -->
                <path d="M20,4.5 C12,4.5 5.5,11 5.5,19 C5.5,28.5 20,36.5 20,36.5 C20,36.5 34.5,28.5 34.5,19 C34.5,11 28,4.5 20,4.5 Z" fill="${fillColor}" />
                
                <!-- 中央の白丸 -->
                <circle cx="20" cy="18" r="6.5" fill="#ffffff" />
            </svg>
        `;
        }

        // 通常/選択中の2種類のL.divIconをあらかじめ用意しておき、クリックの都度は差し替えのみで済むようにする
        function createShelterDivIcon(selected) {
            return L.divIcon({
                html: buildShelterPinSvg(selected ? SHELTER_PIN_SELECTED_COLOR : SHELTER_PIN_DEFAULT_COLOR),
                className: `bg-transparent${selected ? ' shelter-pin-selected' : ''}`,
                iconSize: [40, 40],
                iconAnchor: [20, 39] // ピンの先端が正確な位置を指すようにアンカーを調整
            });
        }
        const SHELTER_ICON_DEFAULT = createShelterDivIcon(false);
        const SHELTER_ICON_SELECTED = createShelterDivIcon(true);

        function getFilteredShelters() {
            return MOCK_SHELTERS.filter(shelter => {
                // 施設区分のフィルター (OR条件)
                if (filters.type.length > 0) {
                    const hasType = filters.type.some(t => shelter.type.includes(t));
                    if (!hasType) return false;
                }
                
                // 災害のフィルター (AND条件 - 選択した全ての災害に対応しているか)
                if (filters.disaster.length > 0) {
                    const hasAllDisasters = filters.disaster.every(d => shelter.disasters.includes(d));
                    if (!hasAllDisasters) return false;
                }
                
                return true;
            });
        }

        // 距離の表示用フォーマット（リスト・ポップアップで共通利用）
        function formatDistance(shelter) {
            if (shelter.distance === undefined) return '';
            const d = shelter.distance < 1000 ? `${Math.round(shelter.distance)}m` : `${(shelter.distance / 1000).toFixed(1)}km`;
            return `現在地から ${d}`;
        }

        // 施設区分・対応災害のバッジHTML生成（リスト・ポップアップで共通利用。重複コード削減）
        function buildTypeBadgesHtml(shelter) {
            return shelter.type.map(t => `<span class="bg-[var(--md-primary-container)] text-[var(--md-on-primary-container)] px-1.5 py-0.5 rounded text-[10px] font-bold">${t}</span>`).join('');
        }
        function buildDisasterBadgesHtml(shelter) {
            return (shelter.disasters || []).map(d => {
                const meta = DISASTER_META[d];
                if (!meta) return '';
                return `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-bold ${meta.classes}">
                    <span class="w-1.5 h-1.5 rounded-full ${meta.dot}"></span>${meta.label}
                </span>`;
            }).join('');
        }

        // マーカータップ時に地図上へ出す施設情報ポップアップの中身
        // (bindPopupに関数を渡すことで、開くたびに最新の距離を反映する)
        function buildPopupHtml(shelter) {
            const dist = formatDistance(shelter);
            return `
                <div class="min-w-[180px] max-w-[220px]">
                    <h3 class="font-bold text-[14px] mb-1" style="color: var(--md-on-surface);">${shelter.name}</h3>
                    <p class="text-[11px] mb-1.5" style="color: var(--md-on-surface-variant);">${shelter.desc}</p>
                    <div class="flex flex-wrap gap-1 mb-1">${buildTypeBadgesHtml(shelter)}</div>
                    <div class="flex flex-wrap gap-1">${buildDisasterBadgesHtml(shelter)}</div>
                    ${dist ? `<div class="text-[10px] font-bold px-2 py-1 rounded bg-[var(--md-surface-container)] text-[var(--md-on-surface-variant)] inline-block mt-2">${dist}</div>` : ''}
                </div>
            `;
        }

        // 現在選択中（＝直近でタップされた）避難所のID。ピンの色とリストのハイライトを連動させるために使う
        let selectedShelterId = null;

        // 避難所を「選択」する処理を一箇所にまとめる
        // (地図上のピンをタップ / リストの項目をタップ、どちらから呼ばれても同じ挙動になるようにする)
        function selectShelter(shelter, { fromMap = false } = {}) {
            const prevId = selectedShelterId;
            selectedShelterId = shelter.id;

            // ピンの色を更新（前回選択していたピンは通常色に戻し、今回選択したピンだけ赤くする）
            markers.forEach(m => {
                if (m.id === prevId && m.id !== shelter.id) m.marker.setIcon(SHELTER_ICON_DEFAULT);
                if (m.id === shelter.id) m.marker.setIcon(SHELTER_ICON_SELECTED);
            });

            map.flyTo([shelter.lat, shelter.lng], DETAIL_VIEW_ZOOM, { duration: 0.8 });
            highlightCard(shelter.id);

            // 地図上のピンをタップした場合は、その場で施設情報ポップアップを開く
            const target = markers.find(m => m.id === shelter.id);
            if (fromMap && target) {
                target.marker.openPopup();
            }

            // モバイル時はタップでシートを下げ、地図とポップアップが隠れないようにする
            if (window.innerWidth < 768) expandBottomSheet(false);
        }

        function renderMarkers() {
            // 古いマーカーを削除
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];

            const filtered = getFilteredShelters();
            // フィルターで選択中の避難所が消えた場合は選択状態を解除する
            if (selectedShelterId !== null && !filtered.some(s => s.id === selectedShelterId)) {
                selectedShelterId = null;
            }

            filtered.forEach(shelter => {
                const isSelected = shelter.id === selectedShelterId;
                const marker = L.marker([shelter.lat, shelter.lng], {
                    icon: isSelected ? SHELTER_ICON_SELECTED : SHELTER_ICON_DEFAULT
                }).addTo(map);

                // タップで施設情報がすぐ見えるよう、ポップアップを常時バインドしておく
                // (関数で渡すことで、開くたびに最新の距離情報を反映できる)
                marker.bindPopup(() => buildPopupHtml(shelter), { closeButton: true, maxWidth: 240 });

                marker.on('click', () => selectShelter(shelter, { fromMap: true }));

                markers.push({ id: shelter.id, marker: marker });
            });
        }

        function renderList() {
            shelterList.innerHTML = '';
            
            let displayList = getFilteredShelters();
            
            // 現在地があれば距離を計算して近い順にソート
            if (userLocation) {
                displayList.forEach(s => {
                    s.distance = map.distance([userLocation.lat, userLocation.lng], [s.lat, s.lng]);
                });
                displayList.sort((a, b) => a.distance - b.distance);
            }

            shelterCount.innerText = `施設一覧 (${displayList.length}件)`;
            
            // フィルター適用中インジケーターの切り替え
            if (filters.type.length > 0 || filters.disaster.length > 0) {
                filterActiveIndicator.classList.remove('hidden');
            } else {
                filterActiveIndicator.classList.add('hidden');
            }

            if (displayList.length === 0) {
                shelterList.innerHTML = '<div class="p-4 text-center text-sm text-gray-500">条件に一致する避難所がありません。</div>';
                return;
            }

            displayList.forEach(shelter => {
                const li = document.createElement('li');
                li.id = `card-${shelter.id}`;
                li.className = 'm3-interactive bg-white rounded-2xl p-4 shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition-shadow';

                const dist = formatDistance(shelter);
                const distHtml = dist ? `<div class="text-[11px] font-bold px-2 py-1 rounded bg-[var(--md-surface-container)] text-[var(--md-on-surface-variant)] inline-block mt-2">${dist}</div>` : '';

                li.innerHTML = `
                    <h3 class="font-bold text-[15px] mb-1" style="color: var(--md-on-surface);">${shelter.name}</h3>
                    <p class="text-xs text-gray-500 mb-2">${shelter.desc}</p>
                    <div class="flex flex-wrap gap-1 mb-1.5">${buildTypeBadgesHtml(shelter)}</div>
                    <div class="flex flex-wrap gap-1 mb-1">${buildDisasterBadgesHtml(shelter)}</div>
                    ${distHtml}
                `;
                
                li.addEventListener('click', () => selectShelter(shelter, { fromMap: false }));
                
                shelterList.appendChild(li);
            });
        }

        function highlightCard(id) {
            document.querySelectorAll('#shelter-list li').forEach(c => {
                c.style.backgroundColor = 'white';
                c.style.borderColor = '#f3f4f6';
            });
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.style.backgroundColor = 'var(--md-surface-container-high)';
                card.style.borderColor = 'var(--md-outline-variant)';
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        filterChips.forEach(chip => {
            chip.addEventListener('click', () => {
                const group = chip.dataset.group;
                const val = chip.dataset.value;
                const icon = chip.querySelector('.check-icon');

                // Toggle active state manually
                const isActive = chip.classList.toggle('active-filter');
                
                if (isActive) {
                    chip.style.backgroundColor = 'var(--md-secondary-container)';
                    chip.style.borderColor = 'transparent';
                    icon.classList.remove('hidden');
                    filters[group].push(val);
                } else {
                    chip.style.backgroundColor = 'transparent';
                    chip.style.borderColor = 'var(--md-outline)';
                    icon.classList.add('hidden');
                    filters[group] = filters[group].filter(v => v !== val);
                }
                
                renderMarkers();
                renderList();
            });
        });

        function setUserLocation(lat, lng, modeName) {
            userLocation = { lat, lng };
            
            if (userMarker) map.removeLayer(userMarker);
            
            // アニメーションを削除したシンプルな現在地アイコン
            const userIcon = L.divIcon({
                className: 'bg-transparent',
                html: `
                    <div class="relative w-12 h-12">
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-blue-500 rounded-full opacity-20"></div>
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-5 h-5 rounded-full border-2 border-white shadow-md z-10" style="background-color: #1A73E8;"></div>
                    </div>
                `,
                iconSize: [48, 48],
                iconAnchor: [24, 24]
            });
            
            userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
            
            currentLocationDisplay.innerText = modeName;
            currentLocationDisplay.style.backgroundColor = 'var(--md-primary)';
            currentLocationDisplay.style.color = 'var(--md-on-primary)';
            
            renderList();
        }

        // GPSボタン処理
        btnGps.addEventListener('click', () => {
            const originalHtml = btnGps.innerHTML;
            btnGps.innerHTML = '<span class="text-xs font-bold">取得中...</span>';
            
            if (!navigator.geolocation) {
                showToast("GPSがサポートされていません");
                btnGps.innerHTML = originalHtml;
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    setUserLocation(lat, lng, "GPS");
                    map.flyTo([lat, lng], DETAIL_VIEW_ZOOM, { duration: 1 });
                    showToast("GPSで現在地を取得しました");
                    btnGps.innerHTML = originalHtml;
                },
                (err) => {
                    showToast("GPSの取得に失敗しました");
                    btnGps.innerHTML = originalHtml;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });

        // マップから選択モード
        btnMapSelect.addEventListener('click', () => {
            locationWindow.classList.add('hidden');
            centerPin.classList.remove('hidden');
            setLocationContainer.classList.remove('hidden');
            
            if(window.innerWidth < 768) {
                expandBottomSheet(false);
            }
            showToast("マップを動かして現在地を合わせてください");
        });

        // 現在地決定ボタン
        btnConfirmLocation.addEventListener('click', () => {
            const center = map.getCenter();
            setUserLocation(center.lat, center.lng, "手動");
            showToast("手動で現在地を設定しました");
            exitMapSelectMode();
        });

        // 現在地選択キャンセル
        btnCancelLocation.addEventListener('click', () => {
            exitMapSelectMode();
        });

        function exitMapSelectMode() {
            locationWindow.classList.remove('hidden');
            centerPin.classList.add('hidden');
            setLocationContainer.classList.add('hidden');
        }

        let startY = 0;
        let isExpanded = false;
        
        function expandBottomSheet(expand) {
            isExpanded = expand;
            if (expand) {
                // Expand (show full list)
                controlPane.style.transform = 'translateY(0)';
            } else {
                // Collapse (show only header and chips)
                controlPane.style.transform = 'translateY(calc(70vh - 56px))';
            }
        }

        // ドラッグ操作の実装
        dragHandleContainer.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            controlPane.style.transition = 'none';
        }, {passive: true});
        
        dragHandleContainer.addEventListener('touchmove', (e) => {
            const currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;
            
            if (isExpanded && deltaY > 0) {
                // 下へドラッグ中
                controlPane.style.transform = `translateY(${deltaY}px)`;
            } else if (!isExpanded && deltaY < 0) {
                // 上へドラッグ中
                controlPane.style.transform = `translateY(calc(70vh - 56px + ${deltaY}px))`;
            }
        }, {passive: true});
        
        dragHandleContainer.addEventListener('touchend', (e) => {
            controlPane.style.transition = 'transform 0.35s cubic-bezier(0.1, 0.76, 0.55, 0.94)';
            const endY = e.changedTouches[0].clientY;
            const deltaY = endY - startY;
            
            // スワイプ距離が50pxを超えたら状態を切り替え
            if (Math.abs(deltaY) > 50) {
                expandBottomSheet(deltaY < 0);
            } else {
                // 元に戻す
                expandBottomSheet(isExpanded);
            }
        }, {passive: true});
        
        // タップでも切り替え
        dragHandleContainer.addEventListener('click', () => {
            expandBottomSheet(!isExpanded);
        });

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'bg-gray-800 text-white px-4 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center justify-between opacity-0 transition-opacity duration-300';
            toast.innerHTML = `<span>${message}</span>`;
            
            toastContainer.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0');
            });
            
            // Remove after delay
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => {
                    if (toast.parentNode) {
                        toastContainer.removeChild(toast);
                    }
                }, 300);
            }, 3000);
        }

        // ================= 出典情報モーダル =================
        btnInfo.addEventListener('click', () => {
            infoModal.classList.remove('hidden');
        });
        function closeInfoModal() {
            infoModal.classList.add('hidden');
        }
        btnInfoClose.addEventListener('click', closeInfoModal);
        infoModalBackdrop.addEventListener('click', closeInfoModal);

        // ================= オフライン用マップ事前ダウンロード =================
        // 緯度経度からタイル座標(x, y)を求める（Slippy map tilenames方式）
        function lonLatToTile(lat, lon, zoom) {
            const latRad = lat * Math.PI / 180;
            const n = Math.pow(2, zoom);
            const x = Math.floor((lon + 180) / 360 * n);
            const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
            return { x, y };
        }

        // 保存対象タイルの座標一覧を作成（MAP_BOUNDS × OFFLINE_MIN_ZOOM〜OFFLINE_MAX_ZOOM）
        function getOfflineTileList() {
            let tiles = [];
            for (let z = OFFLINE_MIN_ZOOM; z <= OFFLINE_MAX_ZOOM; z++) {
                const t1 = lonLatToTile(MAP_BOUNDS.north, MAP_BOUNDS.west, z); // 北西端
                const t2 = lonLatToTile(MAP_BOUNDS.south, MAP_BOUNDS.east, z); // 南東端
                const xMin = Math.min(t1.x, t2.x), xMax = Math.max(t1.x, t2.x);
                const yMin = Math.min(t1.y, t2.y), yMax = Math.max(t1.y, t2.y);
                for (let x = xMin; x <= xMax; x++) {
                    for (let y = yMin; y <= yMax; y++) {
                        tiles.push({ x, y, z });
                    }
                }
            }
            return tiles;
        }

        function tileToUrl(t) {
            return OSM_TILE_URL_TEMPLATE
                .replace('{z}', t.z)
                .replace('{x}', t.x)
                .replace('{y}', t.y);
        }

        // ダウンロードボタンの見た目を「未保存」⇔「準備完了」で切り替える
        let offlineMapReady = false;
        function setDownloadButtonReady(isReady) {
            offlineMapReady = isReady;
            btnDownloadMapIconDefault.classList.toggle('hidden', isReady);
            btnDownloadMapIconReady.classList.toggle('hidden', !isReady);
            btnDownloadMapLabel.innerText = isReady ? 'オフライン用のマップ準備完了' : 'オフライン用に地図を保存';
            btnDownloadMap.style.backgroundColor = isReady ? 'var(--md-primary-container)' : 'var(--md-secondary-container)';
            btnDownloadMap.style.color = isReady ? 'var(--md-on-primary-container)' : 'var(--md-on-secondary-container)';
        }

        // 起動時などに、既に必要なタイルが全部キャッシュ済みかどうかを確認してボタンに反映
        async function refreshDownloadButtonState() {
            if (!('caches' in window)) return;
            try {
                const total = getOfflineTileList().length;
                const cache = await caches.open(TILE_CACHE_NAME);
                const keys = await cache.keys();
                setDownloadButtonReady(total > 0 && keys.length >= total);
            } catch (e) {
                // 確認できない場合は未保存表示のままにしておく
            }
        }

        // タイル取得の同時実行数・リクエスト間隔を回線状況に応じて調整する
        // ・OpenStreetMapのタイルサーバーへの配慮として「同時に叩きすぎない」方針は維持しつつ、
        // 　これまで一律だった値を、実際の回線が速い場合は少し引き上げてダウンロード時間を短縮する。
        // ・Network Information API (navigator.connection) はAndroid Chromeでは利用できるが、
        // 　iPadOS/iOS Safariには実装がないため、その場合は「通常回線」を想定した値にフォールバックする。
        function getDownloadTuning() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn && (conn.saveData || ['slow-2g', '2g', '3g'].includes(conn.effectiveType))) {
                // データ節約モード or低速回線と判定した場合は、これまで通り控えめに
                return { concurrency: 2, intervalMs: 150 };
            }
            // Wi-Fi/4G以上を想定した標準値（iPadOS/Androidの通常利用環境）
            return { concurrency: 4, intervalMs: 60 };
        }

        // ダウンロード進捗を表示する専用トースト（完了までは自動で消えない）
        let progressToastEl = null;
        function updateDownloadProgress(done, total, etaMs) {
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;

            if (!progressToastEl) {
                progressToastEl = document.createElement('div');
                progressToastEl.className = 'bg-gray-800 text-white px-4 py-3 rounded-xl shadow-lg text-sm font-medium flex flex-col gap-2 opacity-0 transition-opacity duration-300 pointer-events-auto';
                progressToastEl.innerHTML = `
                    <span id="download-progress-label">地図データを保存中... 0%</span>
                    <div class="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                        <div id="download-progress-bar" class="h-full rounded-full transition-all duration-200" style="width:0%; background-color: var(--md-primary-container);"></div>
                    </div>
                `;
                toastContainer.appendChild(progressToastEl);
                requestAnimationFrame(() => progressToastEl.classList.remove('opacity-0'));
            }

            let etaLabel = '';
            if (etaMs !== undefined && etaMs > 0 && done < total) {
                const etaSec = Math.round(etaMs / 1000);
                etaLabel = etaSec >= 60 ? `　残り約${Math.ceil(etaSec / 60)}分` : `　残り約${etaSec}秒`;
            }

            progressToastEl.querySelector('#download-progress-label').innerText = `地図データを保存中... ${pct}%（${done}/${total}）${etaLabel}`;
            progressToastEl.querySelector('#download-progress-bar').style.width = `${pct}%`;

            if (done >= total) {
                setTimeout(() => {
                    if (progressToastEl) {
                        progressToastEl.classList.add('opacity-0');
                        setTimeout(() => {
                            if (progressToastEl && progressToastEl.parentNode) {
                                toastContainer.removeChild(progressToastEl);
                            }
                            progressToastEl = null;
                        }, 300);
                    }
                }, 1200);
            }
        }

        async function downloadOfflineMap() {
            if (!('caches' in window)) {
                showToast('お使いのブラウザはオフライン保存に対応していません');
                return;
            }
            if (!navigator.onLine) {
                showToast('オンライン環境で実行してください');
                return;
            }

            const tiles = getOfflineTileList();
            const total = tiles.length;
            const cache = await caches.open(TILE_CACHE_NAME);

            // 既に全タイルが保存済みなら通信せずに終了（再タップ時の無駄な負荷を避ける）
            const existingKeys = await cache.keys();
            if (total > 0 && existingKeys.length >= total) {
                showToast('オフライン地図は既に最新の状態です');
                setDownloadButtonReady(true);
                return;
            }

            let done = 0;
            btnDownloadMap.disabled = true;
            btnDownloadMap.classList.add('opacity-60');
            btnDownloadMapLabel.innerText = '保存中...';
            updateDownloadProgress(0, total);

            // OpenStreetMapのタイルサーバーへの配慮は維持しつつ、回線状況に応じて
            // 同時実行数・間隔を調整することでダウンロード時間を短縮する。
            // （固定で重い間隔を挟んでいた旧実装に比べ、Wi-Fi/4G環境では体感的に大幅に速くなる）
            const { concurrency: CONCURRENCY, intervalMs: REQUEST_INTERVAL_MS } = getDownloadTuning();
            let index = 0;
            let failed = 0;
            const startTime = performance.now();

            async function worker() {
                while (index < tiles.length) {
                    const t = tiles[index++];
                    const url = tileToUrl(t);
                    let fetchedFromNetwork = false;
                    try {
                        const already = await cache.match(url);
                        if (!already) {
                            const res = await fetch(url);
                            fetchedFromNetwork = true;
                            if (res && res.ok) {
                                await cache.put(url, res.clone());
                            } else {
                                failed++;
                            }
                        }
                    } catch (e) {
                        failed++;
                    }
                    done++;
                    // 経過時間と完了数から残り時間を概算してユーザーに提示する
                    const elapsed = performance.now() - startTime;
                    const rate = done / elapsed; // 枚/ms
                    const etaMs = rate > 0 ? (total - done) / rate : undefined;
                    updateDownloadProgress(done, total, etaMs);
                    // 既にキャッシュ済み（＝通信しなかった）タイルは待機不要。
                    // 実際にサーバーへリクエストした時だけ間隔を空け、再開時の無駄な待ちをなくす。
                    if (fetchedFromNetwork) {
                        await new Promise(r => setTimeout(r, REQUEST_INTERVAL_MS));
                    }
                }
            }

            try {
                await Promise.all(Array.from({ length: CONCURRENCY }, () => worker()));
                if (failed === 0) {
                    showToast(`地図データをオフライン保存しました（${total}枚）`);
                    setDownloadButtonReady(true);
                } else {
                    showToast(`保存が完了しました（一部失敗: ${failed}枚 / 全${total}枚）`);
                    setDownloadButtonReady(false);
                }
            } catch (e) {
                showToast('地図データの保存中にエラーが発生しました');
                setDownloadButtonReady(false);
            } finally {
                btnDownloadMap.disabled = false;
                btnDownloadMap.classList.remove('opacity-60');
            }
        }

        // ================= オフライン地図の削除 =================
        async function deleteOfflineMap() {
            btnDeleteMapConfirm.disabled = true;
            try {
                await caches.delete(TILE_CACHE_NAME);
                setDownloadButtonReady(false);
                showToast('オフライン地図データを削除しました');
            } catch (e) {
                showToast('削除中にエラーが発生しました');
            } finally {
                btnDeleteMapConfirm.disabled = false;
                deleteMapModal.classList.add('hidden');
            }
        }

        function closeDeleteMapModal() {
            deleteMapModal.classList.add('hidden');
        }
        btnDeleteMapCancel.addEventListener('click', closeDeleteMapModal);
        deleteMapModalBackdrop.addEventListener('click', closeDeleteMapModal);
        btnDeleteMapConfirm.addEventListener('click', deleteOfflineMap);

        // 準備完了状態（ダウンロード済み）でボタンを押した場合は削除確認を出し、
        // 未保存状態であれば通常どおりダウンロードを開始する
        btnDownloadMap.addEventListener('click', () => {
            if (offlineMapReady) {
                deleteMapModal.classList.remove('hidden');
            } else {
                downloadOfflineMap();
            }
        });

        window.onload = () => {
            initMap();
            refreshDownloadButtonState();

            // 画面リサイズ時の対応 (PC <-> モバイル のレイアウト切り替え)
            window.addEventListener('resize', () => {
                map.invalidateSize();
                if (window.innerWidth >= 768) {
                    controlPane.style.transform = 'none';
                } else {
                    expandBottomSheet(isExpanded);
                }
            });
        };

        // ================= Service Worker登録（PWA / オフライン対応） =================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => {
                        console.log('Service Worker登録成功:', reg.scope);
                    })
                    .catch((err) => {
                        console.warn('Service Worker登録失敗:', err);
                    });
            });
        }
    </script>
</body>
</html>
